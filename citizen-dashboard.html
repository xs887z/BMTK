<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - Обращения 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">Личный кабинет</h1>
            <div class="flex items-center space-x-4">
                <span id="userName" class="text-gray-700"></span>
                <button onclick="logout()" class="text-gray-500 hover:text-gray-700">Выйти</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-6 px-4">
        <!-- Форма обращения -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Новое обращение</h2>
            
            <form id="obrashenieForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Заголовок</label>
                    <input type="text" id="title" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Краткое описание проблемы">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Содержание</label>
                    <textarea id="content" rows="5" required
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                              placeholder="Подробное описание обращения"></textarea>
                </div>
                
                <button type="submit" 
                        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition duration-200">
                    Отправить обращение
                </button>
            </form>
        </div>

        <!-- Список обращений -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Мои обращения</h2>
            <div id="obrasheniyaList" class="space-y-4">
                <!-- Сюда загружаются обращения через JavaScript -->
            </div>
        </div>
    </main>

    <script>
        // Проверка авторизации
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token || user.role !== 'Citizen') {
            window.location.href = '/login.html';
        }
        
        document.getElementById('userName').textContent = user.fullName;
        
        // Загрузка обращений
        loadObrasheniya();
        
        // Обработка формы
        document.getElementById('obrashenieForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value
            };
            
            try {
                const response = await fetch('/api/obrasheniya', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    alert('Обращение успешно отправлено!');
                    document.getElementById('obrashenieForm').reset();
                    loadObrasheniya();
                } else {
                    alert('Ошибка при отправке обращения');
                }
            } catch (error) {
                alert('Ошибка сети');
            }
        });
        
        async function loadObrasheniya() {
            try {
                const response = await fetch('/api/obrasheniya', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const obrasheniya = await response.json();
                    displayObrasheniya(obrasheniya);
                }
            } catch (error) {
                console.error('Ошибка загрузки обращений:', error);
            }
        }
        
        function displayObrasheniya(obrasheniya) {
            const container = document.getElementById('obrasheniyaList');
            
            if (obrasheniya.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">У вас пока нет обращений</p>';
                return;
            }
            
            container.innerHTML = obrasheniya.map(obr => `
                <div class="border-l-4 ${getStatusColor(obr.status)} bg-gray-50 p-4 rounded">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-semibold text-lg">${obr.title}</h3>
                            <p class="text-gray-600 mt-1">${obr.content}</p>
                            <div class="mt-2 text-sm text-gray-500">
                                Категория: ${obr.category} | 
                                Создано: ${new Date(obr.createdAt).toLocaleDateString()}
                            </div>
                        </div>
                        <div class="text-right ml-4">
                            <span class="inline-block px-2 py-1 text-xs font-semibold rounded-full ${getStatusBadgeColor(obr.status)}">
                                ${getStatusText(obr.status)}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusColor(status) {
            const colors = {
                'New': 'border-blue-500',
                'InProgress': 'border-yellow-500', 
                'Processed': 'border-green-500',
                'Rejected': 'border-red-500'
            };
            return colors[status] || 'border-gray-500';
        }
        
        function getStatusBadgeColor(status) {
            const colors = {
                'New': 'bg-blue-100 text-blue-800',
                'InProgress': 'bg-yellow-100 text-yellow-800',
                'Processed': 'bg-green-100 text-green-800', 
                'Rejected': 'bg-red-100 text-red-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }
        
        function getStatusText(status) {
            const texts = {
                'New': 'Новое',
                'InProgress': 'В работе',
                'Processed': 'Обработано',
                'Rejected': 'Отклонено'
            };
            return texts[status] || 'Неизвестно';
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
