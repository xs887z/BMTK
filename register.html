<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Обращения 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4299e1;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #3182ce;
        }
        .btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .success {
            background: #c6f6d5;
            color: #276749;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #4299e1;
            text-decoration: none;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация</h2>
        
        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">ФИО:</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Иванов Иван Иванович">
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required placeholder="Не менее 6 символов" minlength="6">
            </div>

            <div class="form-group">
                <label for="role">Тип аккаунта:</label>
                <select id="role" name="role" required>
                    <option value="">Выберите тип аккаунта</option>
                    <option value="0">Гражданин (отправка обращений)</option>
                    <option value="1">Оператор (обработка обращений)</option>
                </select>
            </div>

            <button type="submit" class="btn" id="submitBtn">Зарегистрироваться</button>
        </form>
        
        <div class="link">
            <a href="login.html">Уже есть аккаунт? Войдите</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            // Показываем загрузку
            submitBtn.disabled = true;
            submitBtn.textContent = 'Регистрация...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                fullName: document.getElementById('fullName').value,
                role: parseInt(document.getElementById('role').value)
            };
            
            // Простая валидация
            if (formData.password.length < 6) {
                showError('Пароль должен содержать не менее 6 символов');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Зарегистрироваться';
                return;
            }
            
            if (!formData.role && formData.role !== 0) {
                showError('Выберите тип аккаунта');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Зарегистрироваться';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    'Accept': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    
                    showSuccess('Регистрация успешна! Выполняется вход...');
                    
                    // Сохраняем токен и данные пользователя
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    // Через 2 секунды перенаправляем
                    setTimeout(() => {
                        if (result.user.role === 'Citizen') {
                            window.location.href = 'citizen-dashboard.html';
                        } else {
                            window.location.href = 'operator-dashboard.html';
                        }
                    }, 2000);
                    
                } else {
                    let errorText = 'Ошибка регистрации';
                    try {
                        const errorData = await response.json();
                        errorText = errorData.message || errorText;
                    } catch {
                        errorText = await response.text() || errorText;
                    }
                    showError(errorText);
                }
            } catch (error) {
                showError('Ошибка сети. Проверьте подключение к интернету.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Зарегистрироваться';
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        // Если уже авторизован - перенаправляем
        const token = localStorage.getItem('token');
        if (token) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.role === 'Citizen') {
                window.location.href = 'citizen-dashboard.html';
            } else {
                window.location.href = 'operator-dashboard.html';
            }
        }
    </script>
</body>
</html>
